<!DOCTYPE html>
<html lang="en">

<head>
    <link
        href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&family=Comic+Relief:wght@400;700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trimmer</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./digit.css">
</head>

<body>
    <div class="sidenav">
        <a id="start" href="#">Start</a>
        <div id="timer" class="timer">0</div>
        <div class="legend">Time</div>
        <div class="score">
            <div id="digit1" class="digit"></div>
            <div id="digit2" class="digit"></div>
        </div>
        <div class="legend">Score</div>
    </div>

    <div class="main">
        <h2>Trimmer</h2>
        <div class="container">
            <div id="field" class="field" tabindex="0" data-text="0">
                <div id="caret" class="figure caret"></div>
            </div>
        </div>

    </div>
    <script type="module" src="./main.js"></script>
</body>

</html>
