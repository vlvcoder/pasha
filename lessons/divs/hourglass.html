<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hourglass</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        .base {
            width: 300px;
            height: 50px;
            background-color: brown;
            margin: 0 auto;
            border-radius: 4px;
        }

        .base-bottom {
            margin-top: -4px;
        }

        .container {
            width: 200px;
            height: 500px;
            margin: -4px auto;
            transition: .5s;
        }

        .air {
            background-color: white;
            -webkit-box-shadow: -3px 0px 69px 10px rgba(44, 139, 213, 0.11) inset;
            -moz-box-shadow: -3px 0px 69px 10px rgba(44, 139, 213, 0.11) inset;
            box-shadow: -3px 0px 69px 10px rgba(44, 139, 213, 0.11) inset;
            transition: 5s ease-out;
        }

        .box {
            height: 50%;
            border: 4px solid brown;
            background-color: rgba(165, 85, 42, 0.5);
            overflow: hidden;
        }

        .up {
            border-bottom-left-radius: 50%;
            border-bottom-right-radius: 50%;

            .air {
                height: 50%;
            }
        }

        .down {
            border-top-left-radius: 50%;
            border-top-right-radius: 50%;
            margin-top: -2px;

            .air {
                height: 100%;
                /* background-color: yellow; */
            }
        }

        .turn {
            rotate: 180deg;
        }

        .container:hover .up .air {
            height: 100%;
        }

        .container:hover .down .air {
            height: 50%;
        }

        .stream {
            background-color: rgba(165, 85, 42, 0.5);
            height: 100%;
            width: 15px;
            margin-left: 50%;
            transform: translateX(-50%);
            display: none;
            position: relative;
        }

        .stream::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 67%;
            width: 0px;
            height: 100%;
            border-left: 7px solid white;
            border-bottom-left-radius: 5px;
        }

        .stream::before {
            content: "";
            position: absolute;
            bottom: 0;
            left: -14%;
            width: 0;
            height: 100%;
            border-right: 7px solid white;
            border-bottom-right-radius: 5px;
        }

        .container:hover .stream {
            display: block;
        }
    </style>
</head>

<body>
    <button id="btnStart" style="padding: 5px; margin: 5px;">Turn</button>

    <div class="base"></div>
    <div class="container">
        <div class="box up">
            <div class="air"></div>
        </div>
        <div class="box down">
            <div class="air">
                <div class="stream"></div>
            </div>
        </div>
    </div>
    <div class="base base-bottom"></div>

    <script>
        const container = document.getElementsByClassName('container')[0];
        document.getElementById('btnStart').addEventListener('click', () => {
            container.classList.toggle('turn');
        });

    </script>

</body>

</html>
