<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bar-chart</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        body {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to bottom right, transparent, rgb(212, 240, 171));
        }

        .container {
            display: flex;
            width: 402px;
            height: 500px;
            align-items: flex-end;
            justify-content: center;
            flex-wrap: nowrap;
            gap: 10px;
            background: linear-gradient(silver, transparent 1px),
                linear-gradient(90deg, silver, transparent 1px);
            background-size: 20px 20px;
            padding: 0 10px;
        }

        .item {
            position: relative;
            background-color: #afeb66;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #30411a;
            font-weight: 600;
            box-shadow: inset 0px 10px 20px 2px rgba(0, 0, 0, 0.5);
            border-top-left-radius: 5px;
            border-top-right-radius: 5px;
        }

        .legend {
            position: absolute;
            left: 50%;
            top: -22px;
            transform: translatex(-50%);
            font-weight: 600;
            color: orangered;
            white-space: nowrap;
        }

        .item-1 {
            height: 40%;
        }

        .item-2 {
            height: 50%;
        }

        .item-3 {
            height: 60%;
        }

        .item-4 {
            height: 80%;
        }

        .item-5 {
            height: 30%;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="item item-1">
            40%
            <span class="legend">Moscow</span>
        </div>
        <div class="item item-2">
            50%
            <span class="legend">New-York</span>
        </div>
        <div class="item item-3">
            60%
            <span class="legend">Rome</span>
        </div>
        <div class="item item-4">
            80%
            <span class="legend">Paris</span>
        </div>
        <div class="item item-5">
            30%
            <span class="legend">Port-Said</span>
        </div>
    </div>
</body>

</html>
