<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@700&family=Golos+Text:wght@400..900&family=Lexend+Zetta:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <title>shop-card</title>
    <style>
        body {
            margin: 0;
            background-color: silver;
            /* background-image: url(./images/tile.png); */
            min-height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;

            /* display: grid;
            grid-template-columns: repeat(auto-fill, 225px);
            gap: 40px 30px;
            justify-content: center; */


            font-family: "Golos Text", sans-serif;
            font-size: 16px;
            line-height: 1.5;
        }

        a {
            text-decoration: none;
        }

        .card {
            width: 225px;
            min-height: 350px;
            box-shadow: 1px 2px 4px rgba(0, 0, 0, 0.1);
            background-color: #fff;
            display: flex;
            flex-direction: column;
            border-radius: 4px;
            transition: 0.2s;
            position: relative;
        }

        .card:hover {
            box-shadow: 4px 8px 16px rgba(0, 0, 0, 0.2);
        }

        .card__label {
            position: absolute;
            bottom: 10px;
            left: 10px;
            padding: 4px 8px;
            background: #ff6633;
            border-radius: 4px;
            font-size: 16px;
            color: #fff;
            font-weight: 400;
        }

        .card__top {
            flex: 0 0 220px;
            position: relative;
            overflow: hidden;
        }

        .card__image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .card__image img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: 0.2s;
        }

        .card__image:hover img {
            transform: scale(1.1);
        }

        .card__bottom {
            display: flex;
            flex-direction: column;
            flex: 1 0 auto;
            padding: 10px;
        }

        .card__prices {
            display: flex;
            margin-bottom: 10px;
        }

        .card__price {
            flex: 0 0 50%;
            position: relative;
        }

        .card__price::after {
            content: "₽";
            margin-left: 4px;
        }

        .card__price--discount {
            font-weight: 700;
            font-size: 19px;
            color: #414141;
            display: flex;
            flex-wrap: wrap-reverse;
        }

        .card__price--discount::before {
            content: "Со скидкой";
            font-size: 13px;
            color: #bfbfbf;
            font-weight: 400;
        }

        .card__price--common {
            font-size: 17px;
            color: #606060;
            display: flex;
            flex-wrap: wrap-reverse;
            justify-content: flex-end;
        }

        .card__price--common::before {
            content: "Обычная";
            font-size: 13px;
            color: #bfbfbf;
            font-weight: 400;
        }

        .card__title {
            display: block;
            margin-bottom: 10px;
            font-size: 17px;
            line-height: 150%;
            color: #414141;
            font-weight: 400;
        }

        .card__title:hover {
            color: #ff6633;
        }

        .card__add {
            display: block;
            width: 100%;
            padding: 10px;
            font-size: 17px;
            color: #ff6633;
            text-align: center;
            border: 1px solid #ff6633;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: auto;
        }

        .card__add:hover {
            background-color: #ff6633;
            color: #fff;
        }

        .card__add:active {
            border-color: #9a2802;
            background-color: #9a2802;
        }
    </style>
</head>

<body>
    <!-- https://codepen.io/shshaw/pen/EbjvbQ -->
    <div class="card">
        <div class="card__top">
            <a href="#" class="card__image">
                <img src="./images/iphone-14-pro-max-gold.png" alt="Apple IPhone 14 PRO Max Gold" />
            </a>
            <div class="card__label">-10%</div>
        </div>
        <div class="card__bottom">
            <div class="card__prices">
                <div class="card__price card__price--discount">135 000</div>
                <div class="card__price card__price--common">150 000</div>
            </div>
            <a href="#" class="card__title">
                Смартфон Apple IPhone 14 Pro Max 256Gb, золотой
            </a>
            <button class="card__add">В корзину</button>
        </div>
    </div>

</body>

</html>
