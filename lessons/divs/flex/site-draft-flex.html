<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
        href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@700&family=Lexend+Zetta:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        body {
            color: whitesmoke;
            transition: 1s;
            font-family: "Poppins", sans-serif;

            .header {
                background-color: rgb(24, 37, 47);
            }

            .center {
                background-color: darkblue;
            }

            .footer {
                background-color: rgb(24, 37, 47);
            }

            .menu {
                background-color: rgb(21, 34, 108);
            }

            .main {
                background-color: rgb(43, 66, 130);
                transition: 1s;
            }

            .box {
                background-color: rgb(40, 54, 92);
                transition: 1s;
            }
        }

        body:has(.mode>input:checked) {
            color: black;

            .header {
                background-color: rgb(206, 234, 255);
            }

            .footer {
                background-color: rgb(206, 234, 255);
            }

            .menu {
                background-color: steelblue;
            }

            .main {
                background-color: whitesmoke;
            }

            .box {
                background-color: rgb(139, 162, 228);
            }
        }

        .header {
            height: 100px;
        }

        .center {
            display: flex;
            min-height: calc(100vh - 200px);
        }

        .footer {
            height: 100px;
        }

        .menu {
            width: 200px;
        }

        .main {
            width: 200px;
            flex-grow: 1;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            align-content: flex-start;

            justify-content: space-around;
        }

        .block {
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 1s;
        }

        .box {
            width: 150px;
            height: 50px;
            margin: 10px;
            border-radius: 10px;

            flex-grow: 1;
        }

        .mode {
            position: fixed;
            left: 10px;
            top: 10px;
        }
    </style>
</head>

<body>
    <label class="mode">
        <input type="checkbox" class="light-mode">
        <span class="light">Light</span>
    </label>

    <div class="header block">Header</div>
    <div class="center">
        <div class="menu block">Menu</div>
        <div class="main">
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
        </div>
    </div>
    <div class="footer block">Footer</div>
</body>

</html>
