<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background-color: #e8e8e8;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .footer {
            width: 500px;
            padding: 10px;
            color: gray;
            margin: 0 auto;
            background-color: #fff;
            border-bottom-left-radius: 10px;
            border-bottom-right-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .footer b {
            padding-bottom: 10px;
            font-size: 22px;
            cursor: pointer;
        }

        .palette {
            margin: 100px auto 0 auto;
            width: 500px;
            height: 300px;
            background-color: #E76F51;
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;
            overflow: hidden;
        }

        .item {
            width: 20%;
            height: 100%;
            float: left;
            transition: 0.2s;
            text-align: center;
            color: white;

            div {
                margin-top: 145px;
                opacity: 0;
            }
        }

        .palette:has(.item:hover) .item {
            width: 18%;
        }

        .palette:has(.item:hover) .item:hover {
            width: 28%;
            div {
                opacity: .6;
            }
        }

        .item:nth-child(1) {
            background-color: #264653;
        }

        .item:nth-child(2) {
            background-color: #2A9D8F;
        }

        .item:nth-child(3) {
            background-color: #E9C46A;
        }

        .item:nth-child(4) {
            background-color: #F4A261;
        }

        .item:nth-child(5) {
            background-color: #E76F51;
        }
    </style>
</head>

<body>
    <div class="palette">
        <div class="item">
            <div>#264653</div>
        </div>
        <div class="item">
            <div>#2A9D8F</div>
        </div>
        <div class="item">
            <div>#E9C46A</div>
        </div>
        <div class="item">
            <div>#F4A261</div>
        </div>
        <div class="item">
            <div>#E76F51</div>
        </div>
    </div>
    <div class="footer">
        <span>Our palette</span>
        <b>...</b>
    </div>
</body>

</html>
