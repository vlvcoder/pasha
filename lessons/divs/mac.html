<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mac buttons</title>
    <style>
        body {
            background-color: #e8e8e8;
        }

        .container {
            background-color: white;
            width: 300px;
            aspect-ratio: 9 / 19.5;
            
            margin: 20px auto;
            padding: 12px;
            border-radius: 12px;
            -webkit-box-shadow: 6px 13px 22px 2px rgba(34, 60, 80, 0.2);
            -moz-box-shadow: 6px 13px 22px 2px rgba(34, 60, 80, 0.2);
            box-shadow: 6px 13px 22px 2px rgba(34, 60, 80, 0.2);

            div {
                width: 16px;
                height: 16px;
                border-radius: 50%;
                float: left;
                margin-right: 8px;
            }
        }

        .red {
            background-color: #FF5F56;
        }

        .yellow {
            background-color: #FFBD2E;
        }

        .green {
            background-color: #28C840;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="red"></div>
        <div class="yellow"></div>
        <div class="green"></div>
    </div>

</body>

</html>
