<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Float</title>
    <style>
        body {
            padding: 0;
            margin: 0;
        }
        .container {
            border: 5px solid red;
            width: 900px;
            margin: 0 auto;
        }

        .block {
            width: 50%;
            height: 200px;
            /* margin: 20px; */
            text-align: center;
            background-color: lightgreen;
        }

        .left {
            background-color: lightseagreen;
            float: left;
        }

        .right {
            float: right;
            background-color: lightblue;
        }

        .clear {
            clear: both;
        }

        p {
            text-align: justify;
        }
    </style>
</head>

<body>
    <!-- <div class="container"> -->
        <div class="block left" style="width: 25%;">1</div>
        <div class="block left" style="background-color: lightpink;">2</div>
        <div class="block left" style="width: 25%;">3</div>
        <!-- <div class="block right">2</div> -->
        <div class="clear"></div>
        <!-- <div class="block">6</div> -->
    <!-- </div> -->

</body>

</html>
