<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        h1 {
            text-align: center;
        }

        .container {
            width: 500px;
            /* height: 300px; */
            border-radius: 5px;
            overflow: hidden;
            margin: 100px auto;
            border-top-left-radius: 150px;
            border-bottom-left-radius: 150px;
            padding-top: 10px;
            padding-bottom: 10px;

            -webkit-box-shadow: -2px 2px 27px 4px rgba(34, 60, 80, 0.2);
            -moz-box-shadow: -2px 2px 27px 4px rgba(34, 60, 80, 0.2);
            box-shadow: -2px 2px 27px 4px rgba(34, 60, 80, 0.2);
        }

        .beam {
            width: 100%;
            height: 30px;
            border: 2px solid rgb(247, 135, 56);
            background-color: rgb(247, 135, 56, 0.3);
            margin-bottom: 5px;
            margin-left: -5px;
            border-radius: 3px;
            transition: 0.3s;
            cursor: pointer;
        }
        .beam:nth-last-child(1) {
            margin-bottom: 0;
        }

        .beam:hover {
            background-color: rgb(247, 135, 56);
        }

        .beam:nth-child(1) {
            width: 80%;
        }

        .beam:nth-child(2) {
            width: 65%;
        }

        .beam:nth-child(3) {
            width: 95%;
        }

        .beam:nth-child(4) {
            width: 25%;
        }

        .beam:nth-child(5) {
            width: 45%;
        }

        .beam:nth-child(6) {
            width: 85%;
        }

        .beam:nth-child(8) {
            width: 75%;
        }
    </style>
</head>

<body>
    <h1>Бревна</h1>
    <div class="container">
        <div class="beam"></div>
        <div class="beam"></div>
        <div class="beam"></div>
        <div class="beam"></div>
        <div class="beam"></div>
        <div class="beam"></div>
        <div class="beam"></div>
        <div class="beam"></div>
    </div>
</body>

</html>
