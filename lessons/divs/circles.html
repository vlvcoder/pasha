<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            width: fit-content;
            margin: 100px auto;
            border-radius: 50px;
            background-color: rgb(170, 88, 188);
       }
        .box {
            width: 100px;
            height: 100px;
            background-color: lightsteelblue;
            border-radius: 50%;
        }

        .box:nth-child(2) {
            margin-top: 100px;
        }


    </style>
</head>
<body>

    <div class="container">
        <div class="box"></div>
        <div class="box"></div>
    </div>
    
</body>
</html>
