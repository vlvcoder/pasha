<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            width: 430px;
            padding: 10px;
            margin-bottom: 20px;
            margin: 0 auto;
        }

        .block {
            background-color: lightgreen;
            width: 100px;
            height: 100px;
            border-radius: 5px;
            transition: 0.3s;

            &:hover {
                box-shadow: 2px 2px 15px 0px rgba(0, 0, 0, 0.2);
            }
        }

        .block-red {
            background-color: lightcoral;
        }
    </style>
</head>

<body>
    <div id="container" class="container">
        <div class="block" onclick="turnElement(this)"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
    </div>

    <script>
        const container = document.getElementById('container');
        const blocks = document.querySelectorAll('.block');

        const turnElement = (element) => element.classList.toggle('block-red');

        // const turn = (event) => event.target.classList.toggle('block-red');

</body>

</html>
