<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <button id="btn1">Кнопка</button>

    <script>
        const btn1 = document.getElementById('btn1');

        const btnClick = () => {
            alert('Hello!');
        }

        btn1.addEventListener('click', btnClick);

</script>
</body>

</html>
