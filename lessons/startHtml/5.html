<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .block {
            border: solid cadetblue 4px;
            border-top: none;
            border-bottom-left-radius: 5px;
            border-bottom-right-radius: 5px;
            margin: 0 auto;
            width: 100px;
            height: 300px;
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        #water {
            background-color: lightblue;
        }
        .controls {
            display: flex;
            gap: 20px;
            justify-content: center;
        }
        button {
            padding: 10px;
            font-size: 24px;
        }
    </style>
</head>

<body>
    <div class="block">
        <div id="water" style="height: 50%;"></div>
    </div>
    <div class="controls">
        <button id="btnUp">⬆️</button>
        <button id="btnDown">⬇️</button>
    </div>

    <script>
        const water = document.getElementById('water');
        const btnUp = document.getElementById('btnUp');
        const btnDown = document.getElementById('btnDown');

        const changeHeight = (step) => {
            let height = parseInt(water.style.height);
            if (!Number.isInteger(height)) {
                return;
            }
            height += step;
            height = Math.min(height, 100);
            height = Math.max(height, 0);
            water.style.height = `${height}%`;
        }

        btnUp.addEventListener('click', () => changeHeight(1));
        btnDown.addEventListener('click', () => changeHeight(-1));

    </script>
</body>

</html>
