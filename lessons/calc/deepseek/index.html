<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Калькулятор</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            /* Убираем выделение при тапе на всех элементах */
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 8px;
            transition: background-color 0.3s ease;
        }

        /* Светлая тема (по умолчанию) */
        body.light-theme {
            background: linear-gradient(145deg, #f0f2f5 0%, #e0e5ec 100%);
        }

        body.light-theme .calculator-card {
            background: #2d3e4f;
        }

        body.light-theme .display {
            background: #a2b9c7;
            color: #0b1a24;
            border: 1px solid #7f9eb5;
        }

        body.light-theme .display-history {
            color: #1e3b4a;
        }

        body.light-theme .calc-btn {
            background: #e9f0f5;
            color: #1e2f3d;
            box-shadow: 0 6px 0 #8b9fb1, 0 8px 12px rgba(0, 0, 0, 0.3);
        }

        body.light-theme .calc-btn.operator {
            background: #ffb259;
            color: #2d2d2d;
            box-shadow: 0 6px 0 #b26b2e, 0 8px 12px rgba(0, 0, 0, 0.3);
        }

        body.light-theme .calc-btn.clear {
            background: #f2a6a6;
            color: #631e1e;
            box-shadow: 0 6px 0 #a15555, 0 8px 12px rgba(0, 0, 0, 0.3);
        }

        body.light-theme .equals-btn {
            background: #6fcf97;
            color: #1f4f2b;
            box-shadow: 0 6px 0 #2d7a4b, 0 8px 12px rgba(0, 0, 0, 0.3);
        }

        body.light-theme .zero-btn {
            background: #e9f0f5;
            color: #1e2f3d;
            box-shadow: 0 6px 0 #8b9fb1, 0 8px 12px rgba(0, 0, 0, 0.3);
        }

        body.light-theme .footer-note {
            color: #bdd3e6;
        }

        /* Тёмная тема */
        body.dark-theme {
            background: linear-gradient(145deg, #1a1e24 0%, #0f1217 100%);
        }

        body.dark-theme .calculator-card {
            background: #1e2a36;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.5), inset 0 -2px 5px rgba(0, 0, 0, 0.4);
        }

        body.dark-theme .display {
            background: #2c3e4f;
            color: #e0e9f0;
            border: 1px solid #3f5568;
            box-shadow: inset 0 4px 8px rgba(0, 0, 0, 0.4), 0 2px 0 #1e2f3d;
        }

        body.dark-theme .display-history {
            color: #9bb7d4;
        }

        body.dark-theme .calc-btn {
            background: #33495e;
            color: #e9f0f5;
            box-shadow: 0 6px 0 #1f2e3a, 0 8px 12px rgba(0, 0, 0, 0.5);
        }

        body.dark-theme .calc-btn.operator {
            background: #c27e3e;
            color: #1a1a1a;
            box-shadow: 0 6px 0 #7b4f26, 0 8px 12px rgba(0, 0, 0, 0.5);
        }

        body.dark-theme .calc-btn.clear {
            background: #b05f5f;
            color: #1a0f0f;
            box-shadow: 0 6px 0 #6f3b3b, 0 8px 12px rgba(0, 0, 0, 0.5);
        }

        body.dark-theme .equals-btn {
            background: #3b9b5e;
            color: #d1f0db;
            box-shadow: 0 6px 0 #1e5a34, 0 8px 12px rgba(0, 0, 0, 0.5);
        }

        body.dark-theme .zero-btn {
            background: #33495e;
            color: #e9f0f5;
            box-shadow: 0 6px 0 #1f2e3a, 0 8px 12px rgba(0, 0, 0, 0.5);
        }

        body.dark-theme .footer-note {
            color: #7e95aa;
        }

        body.dark-theme .theme-toggle {
            background: #33495e;
            color: #e9f0f5;
            box-shadow: 0 4px 0 #1f2e3a;
        }

        /* Основные стили калькулятора */
        .calculator-card {
            width: 100%;
            max-width: 400px;
            border-radius: 32px;
            padding: 20px 16px 24px 16px;
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
            position: relative;
        }

        .display {
            border-radius: 18px;
            padding: 18px 16px;
            margin-bottom: 18px;
            text-align: right;
            font-size: 2.4rem;
            font-weight: 600;
            line-height: 1.2;
            letter-spacing: 1px;
            word-wrap: break-word;
            word-break: break-all;
            min-height: 85px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            font-family: 'Courier New', monospace;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .display-history {
            font-size: 1rem;
            min-height: 1.5rem;
            opacity: 0.8;
            font-weight: 400;
            word-break: break-all;
        }

        .display-main {
            font-size: 2.4rem;
            font-weight: 600;
            line-height: 1.2;
            word-break: break-all;
        }

        .calc-table {
            width: 100%;
            height: 100%;
            border-collapse: collapse;
            table-layout: fixed;
            border-spacing: 0;
        }

        .calc-table td {
            padding: 5px;
            vertical-align: middle;
            height: 100%;
        }

        .calc-table tr {
            height: 1px;
        }

        .calc-btn {
            width: 100%;
            aspect-ratio: 1 / 1;
            border: none;
            border-radius: 24px;
            font-size: 1.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.05s ease-in, background-color 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            font-family: inherit;
            padding: 0;
            font-size: clamp(1.4rem, 6vw, 2rem);
            /* Убираем стандартный outline и фон при тапе */
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        @media (max-width: 360px) {
            .calc-btn {
                border-radius: 18px;
                font-size: 1.5rem;
            }

            .display-main {
                font-size: 2rem;
            }
        }

        @media screen and (max-width: 768px) {
            body {
                padding: 0;
                margin: 0;
            }
            .calculator-card {
                width: 100dvh;
                height: 100dh;
                max-width: none;
                max-height: none;
                border-radius: 0;
            }
        }

        .calc-btn:active {
            transform: translateY(5px);
        }

        /* Убираем outline при фокусе для всех кнопок */
        .calc-btn:focus,
        .equals-btn:focus,
        .zero-btn:focus,
        .theme-toggle:focus {
            outline: none;
        }

        .sqrt-symbol {
            font-size: 1.2em;
            font-weight: 600;
        }

        .footer-note {
            text-align: center;
            font-size: 0.7rem;
            margin-top: 12px;
            letter-spacing: 1px;
        }

        .equals-cell {
            padding: 5px;
            height: 100%;
            vertical-align: stretch;
        }

        .equals-btn {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 24px;
            font-size: 1.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.05s ease-in, background-color 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            font-family: inherit;
            padding: 0;
            font-size: clamp(1.4rem, 6vw, 2rem);
            aspect-ratio: auto;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        .equals-btn:active {
            transform: translateY(5px);
        }

        .zero-cell {
            padding: 5px;
        }

        .zero-btn {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 24px;
            font-size: 1.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.05s ease-in, background-color 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            font-family: inherit;
            padding: 12px 0;
            aspect-ratio: auto;
            font-size: clamp(1.4rem, 6vw, 2rem);
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        .zero-btn:active {
            transform: translateY(5px);
        }

        .dot-btn {
            aspect-ratio: 1 / 1;
        }

        /* Переключатель темы */
        .theme-toggle-container {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 12px;
        }

        .theme-toggle {
            background: #e9f0f5;
            border: none;
            border-radius: 40px;
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 0 #8b9fb1, 0 4px 10px rgba(0, 0, 0, 0.2);
            transition: all 0.1s ease, background-color 0.3s ease, color 0.3s ease;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        .theme-toggle:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #8b9fb1, 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .theme-icon {
            font-size: 1.3rem;
        }

        /* Дополнительная защита от выделения и подсветки на мобильных */
        button {
            -webkit-tap-highlight-color: transparent;
            -webkit-focus-ring-color: transparent;
        }
    </style>
</head>

<body class="light-theme">
    <div class="calculator-card">
        <!-- Переключатель темы -->
        <div class="theme-toggle-container">
            <button class="theme-toggle" id="themeToggle">
                <span class="theme-icon">☀️</span>
                <span class="theme-text">День</span>
            </button>
        </div>

        <div class="display" id="display">
            <div class="display-history" id="history"></div>
            <div class="display-main" id="current">0</div>
        </div>

        <table class="calc-table">
            <tr>
                <td><button class="calc-btn clear" data-action="clear">C</button></td>
                <td><button class="calc-btn operator" data-action="sqrt"><span class="sqrt-symbol">√</span></button>
                </td>
                <td><button class="calc-btn operator" data-action="/">÷</button></td>
                <td><button class="calc-btn operator" data-action="*">×</button></td>
            </tr>
            <tr>
                <td><button class="calc-btn" data-value="7">7</button></td>
                <td><button class="calc-btn" data-value="8">8</button></td>
                <td><button class="calc-btn" data-value="9">9</button></td>
                <td><button class="calc-btn operator" data-action="-">−</button></td>
            </tr>
            <tr>
                <td><button class="calc-btn" data-value="4">4</button></td>
                <td><button class="calc-btn" data-value="5">5</button></td>
                <td><button class="calc-btn" data-value="6">6</button></td>
                <td><button class="calc-btn operator" data-action="+">+</button></td>
            </tr>
            <tr>
                <td><button class="calc-btn" data-value="1">1</button></td>
                <td><button class="calc-btn" data-value="2">2</button></td>
                <td><button class="calc-btn" data-value="3">3</button></td>
                <td rowspan="2" class="equals-cell">
                    <button class="equals-btn" data-action="=">=</button>
                </td>
            </tr>
            <tr>
                <td colspan="2" class="zero-cell" style="padding:5px;">
                    <button class="zero-btn" data-value="0">0</button>
                </td>
                <td style="padding:5px;">
                    <button class="calc-btn dot-btn" data-value=".">,</button>
                </td>
            </tr>
        </table>
    </div>

    <script>
        (function () {
            // Элементы дисплея
            const displayMain = document.getElementById('current');
            const displayHistory = document.getElementById('history');

            // Состояние калькулятора
            let currentInput = '0';
            let previousInput = '';
            let operation = null;
            let resetNext = false;
            const maxLength = 12;

            // Тема
            const themeToggle = document.getElementById('themeToggle');
            const themeIcon = themeToggle.querySelector('.theme-icon');
            const themeText = themeToggle.querySelector('.theme-text');
            const body = document.body;

            // Переключение темы
            function toggleTheme() {
                if (body.classList.contains('light-theme')) {
                    body.classList.remove('light-theme');
                    body.classList.add('dark-theme');
                    themeIcon.textContent = '🌙';
                    themeText.textContent = 'Ночь';
                } else {
                    body.classList.remove('dark-theme');
                    body.classList.add('light-theme');
                    themeIcon.textContent = '☀️';
                    themeText.textContent = 'День';
                }
            }

            themeToggle.addEventListener('click', toggleTheme);

            // Обновление дисплея
            function updateDisplay() {
                displayMain.innerText = currentInput.length > 14 ? parseFloat(currentInput).toExponential(6) : currentInput;
                if (operation && previousInput) {
                    let opSymbol = operation === '*' ? '×' : operation === '/' ? '÷' : operation === 'sqrt' ? '√' : operation;
                    displayHistory.innerText = `${previousInput} ${opSymbol}`;
                } else if (previousInput) {
                    displayHistory.innerText = previousInput;
                } else {
                    displayHistory.innerText = '';
                }
            }

            // Обработка цифр и точки
            function handleNumber(value) {
                if (resetNext) {
                    currentInput = '';
                    resetNext = false;
                }

                if (value === '.') {
                    if (currentInput.includes('.')) return;
                    if (currentInput === '' || currentInput === '-') currentInput = '0';
                    currentInput += '.';
                } else {
                    if (currentInput === '0' && value !== '.') {
                        currentInput = value;
                    } else {
                        if (currentInput.length < maxLength) {
                            currentInput += value;
                        }
                    }
                }
                updateDisplay();
            }

            // Установка операции
            function setOperation(op) {
                if (op === 'sqrt') {
                    if (currentInput === '' || currentInput === '-') return;
                    let x = parseFloat(currentInput);
                    if (x < 0) {
                        currentInput = 'Ошибка';
                        operation = null;
                        previousInput = '';
                        resetNext = true;
                        updateDisplay();
                        return;
                    }
                    let result = Math.sqrt(x);
                    currentInput = result.toString();
                    operation = null;
                    previousInput = '';
                    resetNext = true;
                    updateDisplay();
                    return;
                }

                if (operation !== null && previousInput !== '' && !resetNext) {
                    calculate();
                }

                if (currentInput !== '') {
                    previousInput = currentInput;
                    operation = op;
                    resetNext = true;
                } else if (previousInput !== '') {
                    operation = op;
                }
                updateDisplay();
            }

            // Вычисление результата
            function calculate() {
                if (operation === null || previousInput === '' || currentInput === '') return;

                let a = parseFloat(previousInput);
                let b = parseFloat(currentInput);
                if (isNaN(a) || isNaN(b)) return;

                let result;
                switch (operation) {
                    case '+': result = a + b; break;
                    case '-': result = a - b; break;
                    case '*': result = a * b; break;
                    case '/':
                        if (b === 0) {
                            currentInput = '∞';
                            operation = null;
                            previousInput = '';
                            resetNext = true;
                            updateDisplay();
                            return;
                        }
                        result = a / b;
                        break;
                    default: return;
                }

                if (result.toString().length > maxLength) {
                    result = result.toExponential(6);
                }

                currentInput = result.toString();
                operation = null;
                previousInput = '';
                resetNext = true;
                updateDisplay();
            }

            // Сброс
            function allClear() {
                currentInput = '0';
                previousInput = '';
                operation = null;
                resetNext = false;
                updateDisplay();
            }

            // Обработчики кликов на кнопки
            document.querySelectorAll('.calc-btn, .zero-btn, .equals-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    const value = btn.dataset.value;
                    const action = btn.dataset.action;

                    if (value !== undefined) {
                        handleNumber(value);
                    } else if (action) {
                        if (action === 'clear') {
                            allClear();
                        } else if (action === '=') {
                            calculate();
                        } else if (action === 'sqrt') {
                            setOperation('sqrt');
                        } else {
                            setOperation(action);
                        }
                    }
                });
            });

            // Клавиатурная поддержка
            window.addEventListener('keydown', (e) => {
                const key = e.key;
                if (key >= '0' && key <= '9') handleNumber(key);
                if (key === '.') handleNumber('.');
                if (key === '+') setOperation('+');
                if (key === '-') setOperation('-');
                if (key === '*') setOperation('*');
                if (key === '/') {
                    e.preventDefault();
                    setOperation('/');
                }
                if (key === 'Enter' || key === '=') calculate();
                if (key === 'Escape' || key === 'c' || key === 'C') allClear();
            });

            // Начальное состояние
            updateDisplay();
        })();
    </script>
</body>

</html>
