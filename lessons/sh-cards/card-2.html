<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Comfortaa', sans-serif;
        }

        body {
            background-color: rgb(0, 0, 0, 0.02);
        }

        .card {
            margin: 100px auto;
            display: flex;
            flex-direction: column;

            background-color: white;
            border-radius: 10px;
            overflow: hidden;
            width: 300px;            

            -webkit-box-shadow: 0px 0px 8px 5px rgba(34, 60, 80, 0.2);
            -moz-box-shadow: 0px 0px 8px 5px rgba(34, 60, 80, 0.2);
            box-shadow: 0px 0px 8px 5px rgba(34, 60, 80, 0.2);
        }

        .head img {
            width: 100%;
        }

        .content {
            flex-grow: 1;
            padding: 10px;
            color: rgb(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .desc {
            font-family: 'Roboto', sans-serif;
            padding: 10px;
            padding-top: 0;
            color: #aaaaaa;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="head">
            <img src="https://images.wallpaperscraft.com/image/single/car_sportscar_gray_157905_800x600.jpg" alt="car">
        </div>

</html>
