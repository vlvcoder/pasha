<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&display=swap" rel="stylesheet">
    <title>Document</title>
    <style>
        body {
            font-family: Comfortaa;
            text-align: center;
        }
        table {
            border-collapse: collapse;
            border-spacing: 0px;
            margin: 0 auto;
            width: 50%;
        }
        td, th {
            border: solid 2px rgb(0, 109, 55);
            padding: 5px;
            height: 50px;
        }
        th {
            background-color: rgb(0, 159, 80);
            color: white;
        }
        .hor {
            background-color: rgb(255, 179, 87);
        }
        .vert {
            background-color: rgb(85, 206, 253);
        }
    </style>
</head>

<body>
    <h1>Зеленая таблица (Шрифт Comfortaa)</h1>
    <p>Высота всех строк таблилцы = 50px</p>

    <table>
        <thead>
            <tr>
                <th></th>
                <th>Столбец 1</th>
                <th>Столбец 2</th>
                <th>Столбец 3</th>
                <th>Столбец 4</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <th>Строка 1</th>
                <td>Ячейка 1-1</td>
                <td>Ячейка 1-2</td>
                <td>Ячейка 1-3</td>
                <td></td>
            </tr>
            <tr>
                <th>Строка 2</th>
                <td>Ячейка 2-1</td>
                <td class="vert" rowspan="2"></td>
                <td class="hor" colspan="2"></td>
            </tr>
            <tr>
                <th>Строка 3</th>
                <td></td>
                <td></td>
                <td>Ячейка 3-3</td>
            </tr>
        </tbody>
    </table>

</body>

</html>
