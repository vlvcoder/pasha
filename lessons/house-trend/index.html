<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>house</title>
    <link rel="stylesheet" href="./styles/sky.css">
    <link rel="stylesheet" href="./styles/brick.css">
    <link rel="stylesheet" href="./styles/tile.css">
    <link rel="stylesheet" href="./styles/effect.css">
    <link rel="stylesheet" href="./styles/main.css">
    <link rel="stylesheet" href="./styles/ground.css">
</head>

<body>
    <div class="container-universe sky-milky-way">
        <div class="container-ground container-ground-1 ground-face-2"></div>
        <div class="container-ground container-ground-2 ground-face-2"></div>
        <div class="container-ground ground-thumbler ground-face-2"></div>
    </div>
    <div class="container">
        <div class="sky-thumbler"></div>
        <div class="house tile-1 brick-1 effect-rotate--2">
            <div class="roof">
                <div class="window top sky-sunrise"></div>
            </div>
            <div class="main">
                <div class="window left sky-clear"></div>
                <div class="window right sky-sunset"></div>
                <div class="door"></div>
            </div>
        </div>

        <div class="house tile-2 brick-2 roof-form-triangle">
            <div class="roof effect-rotate-1">
                <div class="window top sky-autumn"></div>
            </div>
            <div class="main">
                <div class="window left sky-clear effect-skew-1"></div>
                <div class="window right sky-purple-sunset effect-rotate-1"></div>
                <div class="door"></div>
            </div>
        </div>

        <div class="house brick-3 roof-form-skat">
            <div class="roof">
                <div class="window top sky-storm"></div>
            </div>
            <div class="main">
                <div class="window left sky-magical"></div>
                <div class="window right sky-pink-dusk"></div>
                <div class="door"></div>
            </div>
        </div>

        <div class="house tile-2 brick-4 roof-form-flat">
            <div class="roof">
                <div class="window top sky-storm"></div>
            </div>
            <div class="main">
                <div class="window left sky-after-storm"></div>
                <div class="window right sky-clear"></div>
                <div class="door"></div>
            </div>
        </div>
    </div>
    <script src="./js/main.js" type="module"></script>
</body>

</html>
