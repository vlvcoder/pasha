{
    "openapi": "3.0.3",
    "info": {
        "title": "marriageAgency",
        "description": "REST API MarriageAgency application",
        "version": "0.0.3",
        "contact": {
            "name": "Owner name",
            "email": "owner@mail.ru"
        }
    },
    "servers": [
        {
            "url": "http://localhost:3006",
            "description": "MOCK-сервер"
        },
        {
            "url": "http://blabla.com",
            "description": "Несуществующий сервер"
        }
    ],
    "tags": [
        {
            "name": "user",
            "description": "Пользователь"
        }
    ],
    "paths": {
        "/users": {
            "get": {
                "operationId": "getUsers",
                "summary": "Запрос списка пользователей",
                "tags": [
                    "user"
                ],
                "parameters": [
                    {
                        "name": "searchString",
                        "in": "query",
                        "description": "Строка поиска",
                        "required": false,
                        "schema": {
                            "type": "string"
                        },
                        "example": "Potter"
                    }
                ],
                "responses": {
                    "200": {
                        "description": "Список пользователей",
                        "content": {
                            "application/json": {
                                "schema": {
                                    "type": "array",
                                    "items": {
                                        "$ref": "#/components/schemas/User"
                                    }
                                }
                            }
                        }
                    },
                    "default": {
                        "description": "Ошибка",
                        "content": {
                            "application/json": {
                                "schema": {
                                    "$ref": "#/components/schemas/Error"
                                }
                            }
                        }
                    }
                }
            },
            "post": {
                "operationId": "addUser",
                "summary": "Добавление пользователя",
                "tags": [
                    "user"
                ],
                "requestBody": {
                    "required": true,
                    "content": {
                        "application/json;charset=utf-8": {
                            "schema": {
                                "$ref": "#/components/schemas/User"
                            }
                        }
                    }
                },
                "responses": {
                    "201": {
                        "description": "Список пользователей, желающих вступить в брак",
                        "content": {
                            "application/json": {
                                "schema": {
                                    "$ref": "#/components/schemas/CompleteWithId"
                                }
                            }
                        }
                    },
                    "default": {
                        "description": "Ошибка",
                        "content": {
                            "application/json": {
                                "schema": {
                                    "$ref": "#/components/schemas/Error"
                                }
                            }
                        }
                    }
                }
            }
        }
    },
    "components": {
        "schemas": {
            "User": {
                "type": "array",
                "items": {
                    "type": "object",
                    "required": [
                        "name",
                        "surname",
                        "age"
                    ],
                    "properties": {
                        "id": {
                            "type": "integer",
                            "format": "int64",
                            "description": "id пользователя",
                            "example": 123
                        },
                        "name": {
                            "type": "string",
                            "description": "Имя",
                            "example": "Tom"
                        },
                        "surname": {
                            "type": "string",
                            "description": "Фамилия",
                            "minLength": 2,
                            "example": "Cruise"
                        },
                        "age": {
                            "type": "integer",
                            "description": "Возраст",
                            "example": 35
                        },
                        "gender": {
                            "type": "string",
                            "description": "Пол",
                            "example": "male",
                            "enum": [
                                "male",
                                "female"
                            ]
                        }
                    }
                }
            },
            "Complete": {
                "type": "object",
                "description": "Сведения об успешном завершении операции",
                "required": [
                    "message"
                ],
                "properties": {
                    "message": {
                        "type": "string",
                        "description": "Сообщение пользователю",
                        "example": "Операция выполнена успешно"
                    }
                }
            },
            "Error": {
                "allOf": [
                    {
                        "$ref": "#/components/schemas/Complete"
                    },
                    {
                        "type": "object",
                        "description": "Сведения об ошибке",
                        "properties": {
                            "details": {
                                "type": "string",
                                "description": "Дополнительные сведения об ошибке",
                                "example": "Дополнительные сведения об ошибке: code, stack trace ..."
                            }
                        }
                    }
                ]
            },
            "CompleteWithId": {
                "allOf": [
                    {
                        "$ref": "#/components/schemas/Complete"
                    },
                    {
                        "type": "object",
                        "description": "Сведения об успешном завершении операции",
                        "properties": {
                            "id": {
                                "type": "integer",
                                "format": "Int64",
                                "description": "id объекта",
                                "example": 321231
                            }
                        }
                    }
                ]
            }
        }
    }
}